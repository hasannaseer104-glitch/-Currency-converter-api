<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency converter</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h2>Currency Converter</h2>
        <form>
          <div class="amount">
            <p>Enter Amount</p>
            <input value="100" type="text">
          </div>
          <div class="dropdown">
            <div class="from">
                <p>from</p>
                <div class="select-container">
                    <img  src="https://flagsapi.com/PK/shiny/64.png">
                    <select name="from" >
                    </select>
                </div>
            </div>
              <img id="img" src="https://cdn-icons-png.flaticon.com/128/3314/3314308.png" alt="exchange icon">
            <div class="to">
                <p>To</p>
                <div class="select-container">
                    <img src="https://flagsapi.com/US/shiny/64.png">
                    <select name="To" >
                    </select>
                </div>
            </div>
          </div>
          <div class="msg">280PKR = 1USD</div>
          <button>Get exchange rate</button>
        </form>
         
    </div>
    <script src="code.js"></script>
    <script src="object.js"></script>
</body>
</html>
